## Protein-ligand docking and docking poses re-ranking
##
## input: pdb structures from PDBbind refined dataset
## output: 
##    1. docking poses 
##    2. scoring file (vina score, sfct correction, combined_score for re-ranking docking poses)

steps:
- extract_pdbbind_refined:
    in:
      # https://pandas.pydata.org/docs/reference/api/pandas.DataFrame.query.html
      # The query() method uses a slightly modified Python syntax by default.
      # For example, the & and | (bitwise) operators have the precedence of their
      # boolean cousins, and and or. This is syntactically valid Python, however
      # the semantics are different.
      query: '(Kd_Ki == "Kd") and (value < 0.001)'
      max_row: 1 #25 # Use 1 for CI
      convert_Kd_dG: True
      output_txt_path: '&binding_data.txt'
      output_pdb_paths: '&pdbbind_pdbs'
      output_sdf_paths: '&pdbbind_sdfs'
      experimental_dGs: '&exp_dGs'
      pdb_ids: '&pdbids'
      
- config_tag_pdb:
    scatter: [pdb_id]
    in:
      pdb_id: '*pdbids'
      filter: "False"
      output_config_string: '&pdb_id_str'
- pdb:
    scatter: [config]
    in:
      output_pdb_path: '&rcsb_protein.pdb'
      config: '*pdb_id_str'

- pdb_fixer:
    in:
      input_pdb_path: '*pdbbind_pdbs'
      input_helper_pdb_path: '*rcsb_protein.pdb' # Note: PDBFixer utilizes sequence information from this file
      output_pdb_path: '&pdbbind_pdbfixer.pdb'
      add_atoms: heavy
      add_residues: True
      replace_nonstandard: True
      keep_heterogens: none
    scatter: [input_pdb_path, input_helper_pdb_path]
    scatterMethod: dotproduct

- extract_protein:
    scatter: [input_pdb_path]
    in:
      input_pdb_path: '*pdbbind_pdbfixer.pdb'
      output_pdb_path: '&protein.pdb'

- minimize_ligand_only.yml:
    scatter: [sdf_path]
    in:
      sdf_path: '*pdbbind_sdfs'

- smina_docking:
    scatter: [receptor_file, ligand_file, ligand_box]
    scatterMethod: dotproduct
    in:
      receptor_file: '*protein.pdb'
      ligand_file: '*ligand_min.mol2'
      ligand_box: '*ligand_min.mol2'
      scoring: 'vina'
      local_only: True
      output_dock_file: '&ligand_opt.pdb'
      output_path: output

- rename_residues_pdb:
    scatter: [input_path]
    in:
      input_path: '*ligand_opt.pdb'
      output_path: '&ligand_opt_clean.pdb'
      residue_name: LIG # Note, the residue name should be three characters
      # See: https://www.cgl.ucsf.edu/chimera/1.4/docs/UsersGuide/tutorials/pdbintro.html
      line_start_column_idxs: '{"ATOM": 3, "HETATM": 3, "TER": 2}'

- combine_pdb:
    scatter: [input_structure1, input_structure2]
    scatterMethod: dotproduct
    in:
      input_structure1: '*protein.pdb'
      input_structure2: '*ligand_opt_clean.pdb'
      output_structure_path: '&complex_pdbs.pdb'

- onionnet_featurize:
    in:
      pdb_paths: '*complex_pdbs.pdb'
      output_feature_file: '&output_features.csv'
    
- onionnet_score:
    in:
      input_feature_file: '*output_features.csv'
      output_score_file: '&predicted_pKa.csv'
      onionnet_score: '&onionnet_score'

- scatter_plot:
    in:
      xs: '*exp_dGs'
      ys: '*onionnet_score'

- check_linear_fit:
    in:
      xs: '*exp_dGs'
      ys: '*onionnet_score'
      # Use massive tolerances because the re-docking performance of classical scoring functions (Vina) are unreliable.
      tol_quad: 0.18
      slope_min: -10
      slope_max: 10

wic:
  graphviz:
    label: Virtual Screening Demo
  steps:
    (1, extract_pdbbind_refined):
      wic:
        graphviz:
          label: Extract PDBbind Data
    (2, config_tag_pdb):
      wic:
        inlineable: False
        graphviz:
          label: Specify PDB Code
    (3, pdb):
      wic:
        inlineable: False
        graphviz:
          label: Download PDB File
    (4, pdbfixer):
      wic:
        inlineable: False
        graphviz:
          label: Fix Protein Structure
    (5, extract_protein):
      wic:
        inlineable: False
        graphviz:
          label: Extract protein
    (6, minimize_ligand_only.yml):
      wic:
        inlineable: False
        graphviz:
          label: Minimize (obminimize) ligand structure.
    (7, smina_docking):
      wic:
        graphviz:
          label: Smina Docking (flexible ligand - rigid protein docking) 
    (8, rename_residues_pdb):
      wic:
        graphviz:
          label: Rename residues to LIG

    (9, combine_pdb):
      wic:
        graphviz:
          label: Combine Protein & Ligand\nPDB Structures
    (10, onionnet_featurize):
      wic:
        graphviz:
          label: Generate features for the Docking Poses
    (11, onionnet_score):
      wic:
        graphviz:
          label: Predict Binding Scores
    (12, scatter_plot):
      wic:
        graphviz:
          label: Plot Experimental\nvs Predicted Binding
    (13, check_linear_fit):
      wic:
        graphviz:
          label: True if fitted slope is between slope_min and slope_max