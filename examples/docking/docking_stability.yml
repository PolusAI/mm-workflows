inputs:
  sdf_path:
    type: File
    format:
    - edam:format_3814

steps:
- docking.yml:
    in:
      # NOTE: sdf_path is currently only necessary
      # due to a limitation of the inlineing implementation.
      sdf_path: ~sdf_path
- stability.yml:
    in:
      # NOTE: crd_path and top_zip_path are currently only necessary
      # due to a limitation of the inlineing implementation.
      crd_path: '*complex_vac.pdb'
      top_zip_path: '*complex_vac.zip'
      nsteps: 100000
      dt: 0.002
      temperature: 298.0
      pressure: 1.0
wic:
  graphviz:
    label: Docking + MD Stability Analysis
  steps:
    (1, docking.yml):
      wic:
        inlineable: True
    (2, stability.yml):
      wic:
        inlineable: False
        steps:
          (1, setup_vac_min.yml):
            wic:
              steps:
                (3, solv_ion.yml):
                  wic:
                    steps:
                      (4, genion):
                        in:
                          output_top_zip_path: '&genion_complex.zip'
          (2, basic.yml):
            in:
              top_zip_path: '*genion_complex.zip'
            wic:
              steps:
                (3, prod.yml):
                  wic:
                    steps:
                      (2, grompp):
                        in:
                          input_top_zip_path: '*genion_complex.zip'
                      (3, mdrun):
                        in:
                          output_crd_path: '&prod_complex.gro'
                      (4, cwl_watcher_analysis.yml):
                        wic:
                          backend: complex
          (3, analysis.yml):
            wic:
              steps:
                (1, analysis_realtime.yml):
                  wic:
                    backend: complex
                (2, analysis_final.yml):
                  wic:
                    backend: complex